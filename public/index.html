<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Game Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #141414;
      --surface:  #1c1c1c;
      --border:   #2a2a2a;
      --dim:      #555555;
      --muted:    #888888;
      --text:     #cccccc;
      --bright:   #ffffff;
      --red:      #cc0000;
      --green:    #4a9;
      --font:     'Courier New', monospace;
    }

    html, body {
      width: 100%; min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: normal;
    }

    header p {
      margin-top: 8px;
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* ── Section titles ──────────────────────────────────────────── */
    .section-title {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 16px;
    }

    /* ── Build form ──────────────────────────────────────────────── */
    .build-section { margin-bottom: 48px; }

    textarea {
      width: 100%;
      height: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      line-height: 1.7;
      padding: 14px;
      resize: vertical;
      outline: none;
      border-radius: 2px;
    }

    textarea::placeholder { color: var(--dim); }
    textarea:focus { border-color: #444; }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--muted);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 7px 18px;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
      white-space: nowrap;
    }

    .btn:hover  { border-color: var(--bright); color: var(--bright); }
    .btn:active { background: #222; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary {
      border-color: #555;
      color: var(--text);
    }

    .btn-primary:hover { border-color: var(--bright); color: var(--bright); }

    #file-label {
      cursor: pointer;
      display: inline-block;
    }

    #file-input { display: none; }

    #file-name {
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* ── Progress terminal ───────────────────────────────────────── */
    .terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px;
      min-height: 80px;
      max-height: 280px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
      margin-top: 16px;
      border-radius: 2px;
    }

    .terminal.visible { display: block; }

    .terminal .log  { color: var(--muted); }
    .terminal .done { color: #4a9; }
    .terminal .err  { color: var(--red); }

    /* ── Game library ────────────────────────────────────────────── */
    .library-section { }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .game-card {
      border: 1px solid var(--border);
      padding: 16px;
      text-decoration: none;
      display: block;
      transition: border-color 0.1s;
      position: relative;
    }

    .game-card:hover { border-color: var(--bright); }

    .game-card .game-name {
      color: var(--text);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    .game-card .game-meta {
      color: var(--dim);
      font-size: 10px;
      letter-spacing: 1px;
    }

    .game-card .play-arrow {
      position: absolute;
      top: 14px; right: 14px;
      color: var(--dim);
      font-size: 12px;
      transition: color 0.1s;
    }

    .game-card:hover .play-arrow { color: var(--bright); }

    .empty-library {
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 16px 0;
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <h1>Card Game Builder</h1>
    <p>paste a rulebook → ai builds the game → play in browser</p>
  </header>

  <!-- ── Build section ───────────────────────────────────────── -->
  <section class="build-section">
    <div class="section-title">Build a game</div>

    <textarea
      id="rulebook-text"
      placeholder="Paste your rulebook here...

Example: Hearts is a 4-player trick-taking game. Each player is dealt 13 cards. Players must follow suit if possible. Hearts are worth 1 point each, the Queen of Spades is worth 13 points. Lowest score wins."
    ></textarea>

    <div class="form-row">
      <label class="btn" id="file-label" for="file-input">Upload PDF / TXT</label>
      <input type="file" id="file-input" accept=".pdf,.txt">
      <span id="file-name"></span>
      <button class="btn btn-primary" id="build-btn" style="margin-left:auto">Build Game ▶</button>
    </div>

    <div class="terminal" id="terminal"></div>
  </section>

  <!-- ── Library section ─────────────────────────────────────── -->
  <section class="library-section">
    <div class="section-title">Your games</div>
    <div class="games-grid" id="games-grid">
      <div class="empty-library">No games yet.</div>
    </div>
  </section>

</div>

<script>
  const rulebookText = document.getElementById('rulebook-text');
  const fileInput    = document.getElementById('file-input');
  const fileName     = document.getElementById('file-name');
  const buildBtn     = document.getElementById('build-btn');
  const terminal     = document.getElementById('terminal');
  const gamesGrid    = document.getElementById('games-grid');

  // ── File picker ───────────────────────────────────────────────
  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    fileName.textContent = f ? f.name : '';
    if (f) rulebookText.value = '';
  });

  rulebookText.addEventListener('input', () => {
    if (rulebookText.value.trim()) {
      fileInput.value = '';
      fileName.textContent = '';
    }
  });

  // ── Build ─────────────────────────────────────────────────────
  buildBtn.addEventListener('click', async () => {
    const text = rulebookText.value.trim();
    const file = fileInput.files[0];

    if (!text && !file) {
      alert('Paste a rulebook or upload a file first.');
      return;
    }

    buildBtn.disabled = true;
    buildBtn.textContent = 'Building...';
    terminal.innerHTML = '';
    terminal.classList.add('visible');

    const form = new FormData();
    if (file) {
      form.append('file', file);
    } else {
      form.append('text', text);
    }

    try {
      const resp = await fetch('/api/build', { method: 'POST', body: form });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let msg;
          try { msg = JSON.parse(line.slice(6)); } catch { continue; }

          if (msg.type === 'ping') continue;

          if (msg.type === 'log') {
            appendLog(msg.text, 'log');
          } else if (msg.type === 'done') {
            appendLog(`\n✓ Done — `, 'done');
            const link = document.createElement('a');
            link.href = msg.url;
            link.textContent = msg.game_id;
            link.style.cssText = 'color:#4a9;text-decoration:none;border-bottom:1px solid #4a9';
            link.target = '_blank';
            terminal.appendChild(link);
            appendLog('\n', 'done');
            loadGames();
          } else if (msg.type === 'error') {
            appendLog(`\n✗ Error: ${msg.message}\n`, 'err');
          }
        }
      }
    } catch (err) {
      appendLog(`\n✗ ${err.message}\n`, 'err');
    } finally {
      buildBtn.disabled = false;
      buildBtn.textContent = 'Build Game ▶';
    }
  });

  function appendLog(text, cls) {
    const span = document.createElement('span');
    span.className = cls;
    span.textContent = text;
    terminal.appendChild(span);
    terminal.scrollTop = terminal.scrollHeight;
  }

  // ── Game library ──────────────────────────────────────────────
  async function loadGames() {
    try {
      const games = await fetch('/api/games').then(r => r.json());
      gamesGrid.innerHTML = '';

      if (!games.length) {
        gamesGrid.innerHTML = '<div class="empty-library">No games yet.</div>';
        return;
      }

      for (const g of games) {
        const card = document.createElement('a');
        card.className = 'game-card';
        card.href = g.url;
        card.target = '_blank';
        card.innerHTML = `
          <span class="game-name">${g.name}</span>
          <span class="game-meta">${g.players ? g.players + ' players' : ''}</span>
          <span class="play-arrow">▶</span>
        `;
        gamesGrid.appendChild(card);
      }
    } catch (e) {
      console.error('Failed to load games:', e);
    }
  }

  loadGames();
</script>
</body>
</html>
