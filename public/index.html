<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Game Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #141414;
      --surface:  #1c1c1c;
      --border:   #2a2a2a;
      --dim:      #555555;
      --muted:    #888888;
      --text:     #cccccc;
      --bright:   #ffffff;
      --red:      #cc0000;
      --green:    #4a9;
      --blue:     #4a7aaa;
      --font:     'Courier New', monospace;
    }

    html, body {
      width: 100%; min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: normal;
    }

    header p {
      margin-top: 8px;
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* ── Section titles ──────────────────────────────────────────── */
    .section-title {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 16px;
    }

    /* ── Build form ──────────────────────────────────────────────── */
    .build-section { margin-bottom: 48px; }

    textarea {
      width: 100%;
      height: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      line-height: 1.7;
      padding: 14px;
      resize: vertical;
      outline: none;
      border-radius: 2px;
    }

    textarea::placeholder { color: var(--dim); }
    textarea:focus { border-color: #444; }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--muted);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 7px 18px;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
      white-space: nowrap;
    }

    .btn:hover  { border-color: var(--bright); color: var(--bright); }
    .btn:active { background: #222; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary {
      border-color: #555;
      color: var(--text);
    }

    .btn-primary:hover { border-color: var(--bright); color: var(--bright); }

    .btn-pvp {
      border-color: #2a4a6a;
      color: var(--blue);
      font-size: 9px;
    }

    .btn-pvp:hover { border-color: var(--blue); color: #6aaae0; }

    #file-label {
      cursor: pointer;
      display: inline-block;
    }

    #file-input { display: none; }

    #file-name {
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* ── Progress terminal ───────────────────────────────────────── */
    .terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px;
      min-height: 80px;
      max-height: 280px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
      margin-top: 16px;
      border-radius: 2px;
    }

    .terminal.visible { display: block; }

    .terminal .log  { color: var(--muted); }
    .terminal .done { color: #4a9; }
    .terminal .err  { color: var(--red); }

    /* ── Game library ────────────────────────────────────────────── */
    .library-section { margin-bottom: 48px; }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .game-card {
      border: 1px solid var(--border);
      padding: 16px;
      transition: border-color 0.1s;
      position: relative;
    }

    .game-card:hover { border-color: #444; }

    .game-card .game-name {
      color: var(--text);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    .game-card .game-meta {
      color: var(--dim);
      font-size: 10px;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 12px;
    }

    .game-card .card-actions {
      display: flex;
      gap: 8px;
    }

    .game-card .btn-play {
      flex: 1;
      text-align: center;
      text-decoration: none;
      padding: 5px 10px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
      font-family: var(--font);
    }

    .game-card .btn-play:hover { border-color: var(--bright); color: var(--bright); }

    .game-card .btn-online {
      flex: 1;
      text-align: center;
      padding: 5px 10px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid #2a4a6a;
      color: var(--blue);
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
      font-family: var(--font);
    }

    .game-card .btn-online:hover { border-color: var(--blue); color: #6aaae0; }

    .empty-library {
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 16px 0;
    }

    /* ── PvP Modal ───────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 420px;
      margin: 24px;
      padding: 28px;
    }

    .modal-title {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 20px;
    }

    .modal-game-name {
      color: var(--text);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .modal-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--dim);
      font-family: var(--font);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 16px 10px;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.1s, border-color 0.1s;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--bright); border-bottom-color: var(--bright); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .field-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dim);
      display: block;
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 8px 12px;
      outline: none;
      margin-bottom: 14px;
    }

    .field-input:focus { border-color: #444; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    /* ── Room status panel (shown after create/join) ─────────────── */
    .room-status {
      display: none;
    }

    .room-status.active { display: block; }

    .room-code-box {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }

    .room-code-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dim);
      display: block;
      margin-bottom: 10px;
    }

    .room-code {
      font-size: 28px;
      letter-spacing: 10px;
      color: var(--bright);
      cursor: pointer;
      user-select: all;
    }

    .room-code:hover { color: #4a9; }

    .room-code-hint {
      font-size: 10px;
      color: var(--dim);
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .room-players {
      margin-bottom: 16px;
    }

    .room-player-row {
      font-size: 11px;
      color: var(--muted);
      padding: 4px 0;
      border-bottom: 1px solid #1e1e1e;
      letter-spacing: 1px;
    }

    .room-player-row.you { color: var(--text); }
    .room-player-row.waiting { color: var(--dim); font-style: italic; }

    .status-line {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .status-line.ready { color: #4a9; }

    .modal-close {
      position: absolute;
      top: 0; right: 0;
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--dim);
      font-size: 16px;
      cursor: pointer;
      font-family: var(--font);
    }

    .modal-close:hover { color: var(--bright); }

    /* relative wrapper for close button */
    .modal { position: relative; }

    /* ── Chat ─────────────────────────────────────────────────────── */
    .chat-log {
      background: var(--bg);
      border: 1px solid var(--border);
      height: 80px;
      overflow-y: auto;
      padding: 8px 10px;
      font-size: 10px;
      line-height: 1.6;
      margin-bottom: 8px;
      display: none;
    }

    .chat-log.active { display: block; }

    .chat-msg-name { color: var(--muted); }
    .chat-msg-text { color: var(--text); }
    .chat-msg-system { color: var(--dim); font-style: italic; }

    .chat-row {
      display: none;
      gap: 6px;
      margin-bottom: 10px;
    }

    .chat-row.active { display: flex; }

    .chat-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      padding: 6px 10px;
      outline: none;
    }

    .chat-input:focus { border-color: #444; }
  </style>
</head>
<body>
<div class="page">

  <header>
    <h1>Card Game Builder</h1>
    <p>paste a rulebook → ai builds the game → play in browser</p>
  </header>

  <!-- ── Build section ───────────────────────────────────────── -->
  <section class="build-section">
    <div class="section-title">Build a game</div>

    <textarea
      id="rulebook-text"
      placeholder="Paste your rulebook here...

Example: Hearts is a 4-player trick-taking game. Each player is dealt 13 cards. Players must follow suit if possible. Hearts are worth 1 point each, the Queen of Spades is worth 13 points. Lowest score wins."
    ></textarea>

    <div class="form-row">
      <label class="btn" id="file-label" for="file-input">Upload PDF / TXT</label>
      <input type="file" id="file-input" accept=".pdf,.txt">
      <span id="file-name"></span>
      <button class="btn btn-primary" id="build-btn" style="margin-left:auto">Build Game ▶</button>
    </div>

    <div class="terminal" id="terminal"></div>
  </section>

  <!-- ── Library section ─────────────────────────────────────── -->
  <section class="library-section">
    <div class="section-title">Your games</div>
    <div class="games-grid" id="games-grid">
      <div class="empty-library">No games yet.</div>
    </div>
  </section>

</div>

<!-- ── PvP Modal ────────────────────────────────────────────── -->
<div class="modal-overlay" id="pvp-modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>

    <div class="modal-title">Play Online</div>
    <div class="modal-game-name" id="modal-game-name"></div>

    <!-- Tab bar -->
    <div class="modal-tabs" id="modal-tabs">
      <button class="tab-btn active" data-tab="create">Create Room</button>
      <button class="tab-btn"        data-tab="join">Join Room</button>
    </div>

    <!-- Create tab -->
    <div class="tab-panel active" id="tab-create">
      <label class="field-label">Your name</label>
      <input class="field-input" id="create-name" type="text" placeholder="Player 1" maxlength="32" autocomplete="off">

      <label class="field-label">Players</label>
      <input class="field-input" id="create-max" type="number" min="2" max="8" value="2">

      <div class="modal-actions">
        <button class="btn btn-primary" id="create-btn" style="flex:1">Create Room</button>
      </div>
    </div>

    <!-- Join tab -->
    <div class="tab-panel" id="tab-join">
      <label class="field-label">Your name</label>
      <input class="field-input" id="join-name" type="text" placeholder="Player 2" maxlength="32" autocomplete="off">

      <label class="field-label">Room code</label>
      <input class="field-input" id="join-code" type="text" placeholder="ABC123" maxlength="6"
             style="text-transform:uppercase;letter-spacing:6px;font-size:16px" autocomplete="off">

      <div class="modal-actions">
        <button class="btn btn-primary" id="join-btn" style="flex:1">Join Room</button>
      </div>
    </div>

    <!-- Room status (replaces tabs after create/join) -->
    <div class="room-status" id="room-status">

      <div class="room-code-box">
        <span class="room-code-label">Room Code</span>
        <div class="room-code" id="room-code-display" title="Click to copy">——</div>
        <div class="room-code-hint">Share this code with other players</div>
      </div>

      <div class="room-players" id="room-players-list"></div>

      <div class="status-line" id="room-status-line">Waiting for players…</div>

      <div class="chat-log active" id="chat-log"></div>
      <div class="chat-row active" id="chat-row">
        <input class="chat-input" id="chat-input" placeholder="Say something…" maxlength="256" autocomplete="off">
        <button class="btn" id="chat-send">Send</button>
      </div>

      <div class="modal-actions">
        <button class="btn" id="leave-btn" style="flex:1">Leave Room</button>
        <button class="btn btn-primary" id="open-game-btn" style="flex:1;display:none">Open Game ▶</button>
      </div>
    </div>

  </div>
</div>

<script>
  // ── DOM refs ──────────────────────────────────────────────────
  const rulebookText = document.getElementById('rulebook-text');
  const fileInput    = document.getElementById('file-input');
  const fileName     = document.getElementById('file-name');
  const buildBtn     = document.getElementById('build-btn');
  const terminal     = document.getElementById('terminal');
  const gamesGrid    = document.getElementById('games-grid');

  const pvpModal     = document.getElementById('pvp-modal');
  const modalClose   = document.getElementById('modal-close');
  const modalGameName = document.getElementById('modal-game-name');
  const modalTabs    = document.getElementById('modal-tabs');
  const roomStatus   = document.getElementById('room-status');
  const roomCodeDisp = document.getElementById('room-code-display');
  const roomPlayersList = document.getElementById('room-players-list');
  const roomStatusLine  = document.getElementById('room-status-line');
  const openGameBtn  = document.getElementById('open-game-btn');
  const leaveBtn     = document.getElementById('leave-btn');
  const chatLog      = document.getElementById('chat-log');
  const chatInput    = document.getElementById('chat-input');
  const chatSend     = document.getElementById('chat-send');

  // ── File picker ───────────────────────────────────────────────
  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    fileName.textContent = f ? f.name : '';
    if (f) rulebookText.value = '';
  });

  rulebookText.addEventListener('input', () => {
    if (rulebookText.value.trim()) {
      fileInput.value = '';
      fileName.textContent = '';
    }
  });

  // ── Build ─────────────────────────────────────────────────────
  buildBtn.addEventListener('click', async () => {
    const text = rulebookText.value.trim();
    const file = fileInput.files[0];

    if (!text && !file) {
      alert('Paste a rulebook or upload a file first.');
      return;
    }

    buildBtn.disabled = true;
    buildBtn.textContent = 'Building...';
    terminal.innerHTML = '';
    terminal.classList.add('visible');

    const form = new FormData();
    if (file) {
      form.append('file', file);
    } else {
      form.append('text', text);
    }

    try {
      const resp = await fetch('/api/build', { method: 'POST', body: form });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let msg;
          try { msg = JSON.parse(line.slice(6)); } catch { continue; }

          if (msg.type === 'ping') continue;

          if (msg.type === 'log') {
            appendLog(msg.text, 'log');
          } else if (msg.type === 'done') {
            appendLog(`\n✓ Done — `, 'done');
            const link = document.createElement('a');
            link.href = msg.url;
            link.textContent = msg.game_id;
            link.style.cssText = 'color:#4a9;text-decoration:none;border-bottom:1px solid #4a9';
            link.target = '_blank';
            terminal.appendChild(link);
            appendLog('\n', 'done');
            loadGames();
          } else if (msg.type === 'error') {
            appendLog(`\n✗ Error: ${msg.message}\n`, 'err');
          }
        }
      }
    } catch (err) {
      appendLog(`\n✗ ${err.message}\n`, 'err');
    } finally {
      buildBtn.disabled = false;
      buildBtn.textContent = 'Build Game ▶';
    }
  });

  function appendLog(text, cls) {
    const span = document.createElement('span');
    span.className = cls;
    span.textContent = text;
    terminal.appendChild(span);
    terminal.scrollTop = terminal.scrollHeight;
  }

  // ── Game library ──────────────────────────────────────────────
  async function loadGames() {
    try {
      const games = await fetch('/api/games').then(r => r.json());
      gamesGrid.innerHTML = '';

      if (!games.length) {
        gamesGrid.innerHTML = '<div class="empty-library">No games yet.</div>';
        return;
      }

      for (const g of games) {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <span class="game-name">${g.name}</span>
          <span class="game-meta">${g.players ? g.players + ' players' : ''}</span>
          <div class="card-actions">
            <a class="btn-play" href="${g.url}" target="_blank">Play ▶</a>
            <button class="btn-online" data-game-id="${g.id}" data-game-name="${g.name}" data-players="${g.players || 2}">Online ⇄</button>
          </div>
        `;
        gamesGrid.appendChild(card);
      }

      // Wire up online buttons
      gamesGrid.querySelectorAll('.btn-online').forEach(btn => {
        btn.addEventListener('click', () => openPvpModal(
          btn.dataset.gameId,
          btn.dataset.gameName,
          parseInt(btn.dataset.players) || 2
        ));
      });

    } catch (e) {
      console.error('Failed to load games:', e);
    }
  }

  loadGames();

  // ── PvP Modal ─────────────────────────────────────────────────

  let pvpWs       = null;
  let pvpGameId   = null;
  let pvpGameUrl  = null;
  let pvpRoomId   = null;
  let pvpMyIdx    = null;
  let pvpPlayers  = [];
  let pvpMaxPlayers = 2;

  function openPvpModal(gameId, gameName, maxPlayers) {
    pvpGameId  = gameId;
    pvpGameUrl = `/games/${gameId}/`;
    pvpMaxPlayers = maxPlayers;
    modalGameName.textContent = gameName;

    // Reset to tab view
    showTabs();
    pvpModal.classList.add('open');

    // Pre-fill max players
    document.getElementById('create-max').value = maxPlayers;
  }

  function showTabs() {
    modalTabs.style.display = 'flex';
    document.getElementById('tab-create').style.display = '';
    document.getElementById('tab-join').style.display    = '';
    roomStatus.classList.remove('active');
    openGameBtn.style.display = 'none';
    switchTab('create');
  }

  function showRoomStatus(roomId) {
    pvpRoomId = roomId;
    modalTabs.style.display  = 'none';
    document.getElementById('tab-create').style.display = 'none';
    document.getElementById('tab-join').style.display   = 'none';
    roomStatus.classList.add('active');
    roomCodeDisp.textContent = roomId;
    chatLog.innerHTML = '';
    updatePlayerList();
  }

  function closePvpModal() {
    pvpModal.classList.remove('open');
    disconnectPvp();
  }

  function connectPvp() {
    if (pvpWs) return;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    pvpWs = new WebSocket(`${proto}//${location.host}/ws/pvp`);

    pvpWs.onmessage = e => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      handlePvpMessage(msg);
    };

    pvpWs.onclose = () => {
      pvpWs = null;
      if (pvpModal.classList.contains('open')) {
        addChatMsg(null, 'Disconnected from server.', 'system');
        roomStatusLine.textContent = 'Disconnected';
        roomStatusLine.className = 'status-line';
      }
    };

    pvpWs.onerror = () => {
      addChatMsg(null, 'Connection error.', 'system');
    };
  }

  function disconnectPvp() {
    if (pvpWs) {
      pvpWs.close();
      pvpWs = null;
    }
    pvpRoomId   = null;
    pvpMyIdx    = null;
    pvpPlayers  = [];
  }

  function sendPvp(obj) {
    if (pvpWs && pvpWs.readyState === WebSocket.OPEN) {
      pvpWs.send(JSON.stringify(obj));
    }
  }

  function handlePvpMessage(msg) {
    switch (msg.type) {

      case 'room_created':
        pvpMyIdx = msg.player_idx;
        pvpPlayers = [document.getElementById('create-name').value.trim() || 'Player 1'];
        showRoomStatus(msg.room_id);
        updatePlayerList();
        roomStatusLine.textContent = `Waiting for players… (${pvpPlayers.length}/${msg.max_players})`;
        break;

      case 'joined':
        pvpMyIdx = msg.player_idx;
        pvpPlayers = msg.players;
        showRoomStatus(msg.room_id);
        updatePlayerList();
        roomStatusLine.textContent = `Waiting for players… (${pvpPlayers.length}/${msg.max_players})`;
        break;

      case 'player_joined':
        pvpPlayers = msg.players;
        pvpMaxPlayers = msg.max_players;
        updatePlayerList();
        addChatMsg(null, `${msg.name} joined the room.`, 'system');
        roomStatusLine.textContent = `Waiting for players… (${msg.player_count}/${msg.max_players})`;
        break;

      case 'game_start':
        pvpPlayers = msg.players;
        pvpMyIdx   = msg.your_player_idx;
        updatePlayerList();
        roomStatusLine.textContent = 'Game starting…';
        roomStatusLine.className = 'status-line ready';
        addChatMsg(null, 'All players joined. Open the game!', 'system');
        openGameBtn.style.display = 'block';
        openGameBtn.onclick = () => {
          const url = `${pvpGameUrl}?room_id=${pvpRoomId}&player_idx=${pvpMyIdx}`;
          window.open(url, '_blank');
        };
        break;

      case 'player_left':
        pvpPlayers = msg.players;
        updatePlayerList();
        addChatMsg(null, `${msg.name} left the room.`, 'system');
        roomStatusLine.textContent = `Waiting for players… (${msg.player_count}/${pvpMaxPlayers})`;
        roomStatusLine.className = 'status-line';
        openGameBtn.style.display = 'none';
        break;

      case 'chat':
        addChatMsg(msg.name, msg.text, msg.player_idx === pvpMyIdx ? 'you' : 'other');
        break;

      case 'error':
        alert(`Error: ${msg.message}`);
        break;
    }
  }

  function updatePlayerList() {
    roomPlayersList.innerHTML = '';
    for (let i = 0; i < pvpMaxPlayers; i++) {
      const row = document.createElement('div');
      if (i < pvpPlayers.length) {
        row.className = `room-player-row${i === pvpMyIdx ? ' you' : ''}`;
        row.textContent = `${i + 1}. ${pvpPlayers[i]}${i === pvpMyIdx ? ' (you)' : ''}`;
      } else {
        row.className = 'room-player-row waiting';
        row.textContent = `${i + 1}. waiting…`;
      }
      roomPlayersList.appendChild(row);
    }
  }

  function addChatMsg(name, text, style) {
    const line = document.createElement('div');
    if (style === 'system') {
      line.className = 'chat-msg-system';
      line.textContent = text;
    } else {
      line.innerHTML = `<span class="chat-msg-name">${name}: </span><span class="chat-msg-text">${text}</span>`;
    }
    chatLog.appendChild(line);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  // ── Tab switching ─────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => {
      p.classList.toggle('active', p.id === `tab-${name}`);
    });
  }

  modalTabs.addEventListener('click', e => {
    if (e.target.classList.contains('tab-btn')) {
      switchTab(e.target.dataset.tab);
    }
  });

  // ── Create room ───────────────────────────────────────────────
  document.getElementById('create-btn').addEventListener('click', () => {
    const name = document.getElementById('create-name').value.trim() || 'Player 1';
    const max  = parseInt(document.getElementById('create-max').value) || 2;
    connectPvp();

    // Wait for WS open then send
    const ws = pvpWs;
    const send = () => sendPvp({ type: 'create_room', game_id: pvpGameId, max_players: max, name });
    if (ws.readyState === WebSocket.OPEN) {
      send();
    } else {
      ws.onopen = send;
    }
  });

  // ── Join room ─────────────────────────────────────────────────
  document.getElementById('join-btn').addEventListener('click', () => {
    const name = document.getElementById('join-name').value.trim() || 'Player';
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    if (!code) { alert('Enter a room code.'); return; }
    connectPvp();

    const ws = pvpWs;
    const send = () => sendPvp({ type: 'join_room', room_id: code, name });
    if (ws.readyState === WebSocket.OPEN) {
      send();
    } else {
      ws.onopen = send;
    }
  });

  document.getElementById('join-code').addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase();
  });

  // ── Copy room code ────────────────────────────────────────────
  roomCodeDisp.addEventListener('click', () => {
    navigator.clipboard.writeText(roomCodeDisp.textContent).then(() => {
      const orig = roomCodeDisp.textContent;
      roomCodeDisp.textContent = 'COPIED';
      setTimeout(() => roomCodeDisp.textContent = orig, 1200);
    });
  });

  // ── Chat ──────────────────────────────────────────────────────
  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

  function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    sendPvp({ type: 'chat', text });
    chatInput.value = '';
    addChatMsg('you', text, 'you');
  }

  // ── Leave / close ─────────────────────────────────────────────
  leaveBtn.addEventListener('click', closePvpModal);
  modalClose.addEventListener('click', closePvpModal);
  pvpModal.addEventListener('click', e => {
    if (e.target === pvpModal) closePvpModal();
  });
</script>
</body>
</html>
